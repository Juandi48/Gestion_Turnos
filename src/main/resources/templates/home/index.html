<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${titulo})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="content">
    <h2 th:text="${titulo}">Inicio</h2>
    <p th:text="${universidad}">Pontificia Universidad Javeriana</p>

    <div class="dashboard-grid">
        <div class="card">
            <h3>Módulo</h3>
            <p class="card-number" th:text="${modulo}">Inicio</p>
        </div>
        <div class="card">
            <h3>Docentes</h3>
            <p>Gestiona docentes del sistema.</p>
        </div>
        <div class="card">
            <h3>Turnos</h3>
            <p>Administra turnos y calendario.</p>
        </div>
        <div class="card">
            <h3>Incidentes</h3>
            <p>Registra y consulta incidentes.</p>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
