<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${titulo})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="content">
    <h2 th:text="${titulo}">Listado de Turnos</h2>

    <div class="table-container">
        <a class="btn btn-primary" th:href="@{/turnos/nuevo}">Nuevo turno</a>
        <a class="btn btn-success" th:href="@{/turnos/calendario}">Ver calendario</a>
        <br><br>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Hora inicio</th>
                <th>Hora fin</th>
                <th>Docente</th>
                <th>Zona</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="turno : ${turnos}">
                <td th:text="${turno.id}"></td>
                <td th:text="${turno.fecha}"></td>
                <td th:text="${turno.horaInicio}"></td>
                <td th:text="${turno.horaFin}"></td>
                <td th:text="${turno.docente != null ? turno.docente.nombreCompleto : 'Sin docente'}"></td>
                <td th:text="${turno.zona != null ? turno.zona.nombre : 'Sin zona'}"></td>
                <td th:text="${turno.estado != null ? turno.estado.etiqueta : 'Sin estado'}"></td>
                <td class="actions">
                    <a class="btn btn-success" th:href="@{'/turnos/detalle/' + ${turno.id}}">Ver</a>
                    <a class="btn btn-primary" th:href="@{'/turnos/editar/' + ${turno.id}}">Editar</a>
                    <a class="btn btn-danger"
                       th:href="@{'/turnos/eliminar/' + ${turno.id}}"
                       onclick="return confirmarEliminar();">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
