<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${titulo})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="content">
    <h2 th:text="${titulo}">Detalle Zona</h2>

    <div class="card">
        <p><strong>ID:</strong> <span th:text="${zona.id}"></span></p>
        <p><strong>Nombre:</strong> <span th:text="${zona.nombre}"></span></p>
        <p><strong>Descripción:</strong> <span th:text="${zona.descripcion}"></span></p>
        <p><strong>Bloque:</strong> <span th:text="${zona.bloque}"></span></p>
        <p><strong>Activa:</strong> <span th:text="${zona.activa ? 'Sí' : 'No'}"></span></p>
        <a class="btn btn-primary" th:href="@{/zonas}">Volver</a>
    </div>
</main>
</body>
</html>
