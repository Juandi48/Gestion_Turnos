<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${titulo})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="content">
    <h2 th:text="${titulo}">Detalle Turno</h2>

    <div class="card">
        <p><strong>ID:</strong> <span th:text="${turno.id}"></span></p>
        <p><strong>Fecha:</strong> <span th:text="${turno.fecha}"></span></p>
        <p><strong>Hora inicio:</strong> <span th:text="${turno.horaInicio}"></span></p>
        <p><strong>Hora fin:</strong> <span th:text="${turno.horaFin}"></span></p>
        <p><strong>Docente:</strong> <span th:text="${turno.docente != null ? turno.docente.nombreCompleto : 'Sin docente'}"></span></p>
        <p><strong>Zona:</strong> <span th:text="${turno.zona != null ? turno.zona.nombre : 'Sin zona'}"></span></p>
        <p><strong>Estado:</strong> <span th:text="${turno.estado != null ? turno.estado.etiqueta : 'Sin estado'}"></span></p>
        <a class="btn btn-primary" th:href="@{/turnos}">Volver</a>
    </div>
</main>
</body>
</html>
