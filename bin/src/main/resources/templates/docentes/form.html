<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${titulo})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="content">
    <h2 th:text="${titulo}">Formulario Docente</h2>

    <div class="form-container">
        <form th:action="@{/docentes/guardar}" th:object="${docente}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" th:field="*{nombre}">
            </div>

            <div class="form-group">
                <label>Apellido</label>
                <input type="text" th:field="*{apellido}">
            </div>

            <div class="form-group">
                <label>Correo</label>
                <input type="email" th:field="*{correo}">
            </div>

            <div class="form-group">
                <label>Activo</label>
                <select th:field="*{activo}">
                    <option th:value="true">Sí</option>
                    <option th:value="false">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Carga de turnos</label>
                <input type="number" th:field="*{cargaTurnos}">
            </div>

            <div class="form-actions">
                <button class="btn btn-success" type="submit">Guardar</button>
                <a class="btn btn-primary" th:href="@{/docentes}">Volver</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
