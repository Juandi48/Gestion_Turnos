<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${titulo})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="content">
    <h2 th:text="${titulo}">Formulario Zona</h2>

    <div class="form-container">
        <form th:action="@{/zonas/guardar}" th:object="${zona}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" th:field="*{nombre}">
            </div>

            <div class="form-group">
                <label>Descripción</label>
                <input type="text" th:field="*{descripcion}">
            </div>

            <div class="form-group">
                <label>Bloque</label>
                <input type="text" th:field="*{bloque}">
            </div>

            <div class="form-group">
                <label>Activa</label>
                <select th:field="*{activa}">
                    <option th:value="true">Sí</option>
                    <option th:value="false">No</option>
                </select>
            </div>

            <div class="form-actions">
                <button class="btn btn-success" type="submit">Guardar</button>
                <a class="btn btn-primary" th:href="@{/zonas}">Volver</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
